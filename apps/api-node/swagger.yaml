openapi: 3.0.3
info:
  title: FPTU Lost & Found Node API
  version: 0.1.0
servers:
  - url: http://localhost:3001/api
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service status
  /auth/register:
    post:
      summary: Register account after validating registration OTP
      responses:
        "201":
          description: Registration completed
  /auth/register/request-otp:
    post:
      summary: Send registration OTP before account creation
      responses:
        "200":
          description: Registration OTP sent
  /auth/verify-otp:
    post:
      summary: Verify registration OTP
      responses:
        "200":
          description: Email verified and token pair issued
  /auth/resend-otp:
    post:
      summary: Resend registration OTP for a pending account
      responses:
        "200":
          description: Verification OTP resent
  /auth/login:
    post:
      summary: Login with email and password
      responses:
        "200":
          description: Token pair issued
  /auth/forgot-password:
    post:
      summary: Request password reset OTP
      responses:
        "200":
          description: Password reset OTP requested
  /auth/reset-password:
    post:
      summary: Reset password with OTP
      responses:
        "200":
          description: Password reset successful
  /auth/refresh:
    post:
      summary: Rotate refresh token
      responses:
        "200":
          description: New token pair issued
  /auth/logout:
    post:
      security:
        - bearerAuth: []
      summary: Revoke refresh token
      responses:
        "200":
          description: Refresh token revoked
  /auth/me:
    get:
      security:
        - bearerAuth: []
      summary: Get current user
      responses:
        "200":
          description: Current user
  /auth/profile:
    put:
      security:
        - bearerAuth: []
      summary: Update current user profile
      responses:
        "200":
          description: Updated profile
  /auth/avatar:
    post:
      security:
        - bearerAuth: []
      summary: Upload current user avatar
      responses:
        "200":
          description: Avatar uploaded
  /auth/activity:
    get:
      security:
        - bearerAuth: []
      summary: Get current user activity
      responses:
        "200":
          description: Activity list
  /auth/reputation:
    get:
      security:
        - bearerAuth: []
      summary: Get current user reputation
      responses:
        "200":
          description: Reputation summary
  /admin/dashboard/overview:
    get:
      security:
        - bearerAuth: []
      summary: Admin dashboard overview metrics
      responses:
        "200":
          description: Admin overview
  /admin/users:
    get:
      security:
        - bearerAuth: []
      summary: Admin list users
      responses:
        "200":
          description: User list
  /admin/categories:
    get:
      security:
        - bearerAuth: []
      summary: Admin list categories
      responses:
        "200":
          description: Category list
    post:
      security:
        - bearerAuth: []
      summary: Admin create category
      responses:
        "201":
          description: Category created
  /admin/locations/areas:
    get:
      security:
        - bearerAuth: []
      summary: Admin list campus areas
      responses:
        "200":
          description: Area list
    post:
      security:
        - bearerAuth: []
      summary: Admin create campus area
      responses:
        "201":
          description: Area created
  /admin/locations/buildings:
    get:
      security:
        - bearerAuth: []
      summary: Admin list campus buildings
      responses:
        "200":
          description: Building list
    post:
      security:
        - bearerAuth: []
      summary: Admin create campus building
      responses:
        "201":
          description: Building created
  /admin/locations/rooms:
    get:
      security:
        - bearerAuth: []
      summary: Admin list campus rooms
      responses:
        "200":
          description: Room list
    post:
      security:
        - bearerAuth: []
      summary: Admin create campus room
      responses:
        "201":
          description: Room created
  /admin/handover-points:
    get:
      security:
        - bearerAuth: []
      summary: Admin list handover points
      description: Returns handover points with mapImageUrl, mapPositionX/Y and storedItems counted from active warehouse items.
      responses:
        "200":
          description: Handover point list
    post:
      security:
        - bearerAuth: []
      summary: Admin create handover point
      description: Creates a handover point and can persist campus map image data/URL plus marker coordinates in percentages.
      responses:
        "201":
          description: Handover point created
  /posts:
    post:
      security:
        - bearerAuth: []
      summary: Create LOST or FOUND post
      responses:
        "201":
          description: Post created
    get:
      summary: List public posts with pagination and filters
      responses:
        "200":
          description: Post list
  /posts/my:
    get:
      security:
        - bearerAuth: []
      summary: List current user's posts
      responses:
        "200":
          description: Post list
  /posts/{id}:
    get:
      summary: Get post detail
      responses:
        "200":
          description: Post detail
    put:
      security:
        - bearerAuth: []
      summary: Update post
      responses:
        "200":
          description: Post updated
    delete:
      security:
        - bearerAuth: []
      summary: Soft-delete post
      responses:
        "200":
          description: Post deleted
  /posts/{id}/media:
    post:
      security:
        - bearerAuth: []
      summary: Upload post images
      responses:
        "201":
          description: Post media uploaded
  /posts/{id}/media/{mediaId}:
    delete:
      security:
        - bearerAuth: []
      summary: Delete post media
      responses:
        "200":
          description: Post media deleted
  /posts/{id}/matches:
    get:
      security:
        - bearerAuth: []
      summary: Get post matching results
      responses:
        "200":
          description: Match result list
  /posts/{id}/status:
    patch:
      security:
        - bearerAuth: []
      summary: Update post status
      responses:
        "200":
          description: Post status updated
  /posts/{id}/claims:
    get:
      security:
        - bearerAuth: []
      summary: List claims for a post
      responses:
        "200":
          description: Claim list
  /search:
    get:
      summary: Search public posts
      responses:
        "200":
          description: Search results
  /claims:
    post:
      security:
        - bearerAuth: []
      summary: Submit claim for a FOUND post
      responses:
        "201":
          description: Claim submitted
  /claims/{id}:
    get:
      security:
        - bearerAuth: []
      summary: Get claim detail
      responses:
        "200":
          description: Claim detail
  /claims/{id}/evidence:
    post:
      security:
        - bearerAuth: []
      summary: Upload claim evidence image
      responses:
        "201":
          description: Claim evidence uploaded
  /config/public:
    get:
      summary: Get public configuration entries
      responses:
        "200":
          description: Public config list
  /categories:
    get:
      summary: List active categories
      responses:
        "200":
          description: Category list
  /locations/areas:
    get:
      summary: List active campus areas
      responses:
        "200":
          description: Area list
  /locations/areas/{id}/buildings:
    get:
      summary: List active buildings in an area
      responses:
        "200":
          description: Building list
  /locations/buildings/{id}/rooms:
    get:
      summary: List active rooms in a building
      responses:
        "200":
          description: Room list
  /handover-points:
    get:
      summary: List active handover points
      description: Returns active handover points with map image/marker coordinates and stored item counts.
      responses:
        "200":
          description: Handover point list
  /handover-points/{id}:
    get:
      summary: Get active handover point detail
      description: Returns one active handover point with map image/marker coordinates and stored item count.
      responses:
        "200":
          description: Handover point detail
  /docs:
    get:
      summary: OpenAPI document
      responses:
        "200":
          description: OpenAPI JSON
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
