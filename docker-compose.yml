services:
  mysql:
    image: mysql:8.0
    container_name: fptu-lost-found-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:?Set DB_NAME in .env}
      MYSQL_USER: ${DB_USER:?Set DB_USER in .env}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    ports:
      - "3306:3306"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: apps/api-node/Dockerfile
    restart: "no"
    environment: &api_environment
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:?Set DB_NAME in .env}
      DB_USER: ${DB_USER:?Set DB_USER in .env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_SSL: "false"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://localhost:8080}
      REDIS_URL: redis://redis:6379
      REDIS_REQUIRED: "true"
      LOG_FORMAT: json
      TRUST_PROXY: ${TRUST_PROXY:-false}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    command: ["node", "apps/api-node/dist/migrations/run-migrations.js"]
    depends_on:
      mysql:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api-node/Dockerfile
    restart: unless-stopped
    environment: *api_environment
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
